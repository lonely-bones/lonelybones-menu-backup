name: Daily menu scrape

# Runs every day at 08:00 UTC (~3-4am Eastern). Also runnable on demand.
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # allow the bot to push updated files

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit any changes
        run: |
          git config user.name  "lonelybones-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily menu refresh $(date -u +%Y-%m-%d)"
            git push
          fi
